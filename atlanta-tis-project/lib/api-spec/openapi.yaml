openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: atlanta
    description: Atlanta traffic intersection analysis
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /atlanta/intersections:
    get:
      operationId: listIntersections
      tags: [atlanta]
      summary: List all Atlanta intersections (summary form)
      description: Returns slim summary records for every analyzed Atlanta metro signalized intersection. Use the detail endpoint for the full intersection model.
      responses:
        "200":
          description: List of intersection summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntersectionSummary"
  /atlanta/intersections/{id}:
    get:
      operationId: getIntersection
      tags: [atlanta]
      summary: Get a single intersection by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Intersection detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntersectionDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /atlanta/summary:
    get:
      operationId: getTrafficSummary
      tags: [atlanta]
      summary: Top-level traffic KPIs
      responses:
        "200":
          description: Summary KPIs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrafficSummary"
  /atlanta/rankings:
    get:
      operationId: getInefficiencyRankings
      tags: [atlanta]
      summary: Intersections ranked by inefficiency score
      responses:
        "200":
          description: Ranked list of intersections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InefficiencyRanking"
  /atlanta/zone-breakdown:
    get:
      operationId: getZoneBreakdown
      tags: [atlanta]
      summary: Aggregated metrics grouped by Atlanta zone
      responses:
        "200":
          description: Per-zone aggregated metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ZoneStat"
  /atlanta/turn-distribution:
    get:
      operationId: getTurnDistribution
      tags: [atlanta]
      summary: Aggregated traffic by movement type (through / left / right)
      responses:
        "200":
          description: Aggregate movement-type demand
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MovementTypeStat"
  /atlanta/signal-timing:
    get:
      operationId: getSignalTimingDistribution
      tags: [atlanta]
      summary: Signal timing distribution across intersections
      responses:
        "200":
          description: Per-intersection signal timing breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SignalTimingPoint"
  /atlanta/peak-hour-load:
    get:
      operationId: getPeakHourLoad
      tags: [atlanta]
      summary: Simulated hourly load profile aggregated across intersections
      responses:
        "200":
          description: Hourly traffic load profile
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HourlyLoadPoint"
  /atlanta/roads:
    get:
      operationId: getRoadNetwork
      tags: [atlanta]
      summary: Major road network for the Atlanta metro
      description: Returns a slim polyline network of all motorway, trunk, primary, and secondary roads in metro Atlanta sourced from OpenStreetMap. Used to render the road overlay on the map.
      responses:
        "200":
          description: Road network
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoadNetwork"
  /atlanta/recommendations:
    get:
      operationId: getRecommendations
      tags: [atlanta]
      summary: Suggested signal-timing changes for the worst intersections
      responses:
        "200":
          description: Recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recommendation"
  /atlanta/optimized-scenario:
    get:
      operationId: getOptimizedScenario
      tags: [atlanta]
      summary: Network-wide re-scoring with all signals retimed to their suggestion
      responses:
        "200":
          description: Optimized scenario bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizedScenario"
  /atlanta/accident-risk:
    get:
      operationId: getAccidentRisk
      tags: [atlanta]
      summary: Per-signal historical accident risk + global timing distributions
      description: Returns 2019-2023 ARC crash counts snapped to nearby signals, plus the NHTSA-FARS-derived hour-of-day, day-of-week, and month-of-year crash distributions used by the prediction model.
      responses:
        "200":
          description: Accident risk bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccidentRiskBundle"
  /atlanta/predict-day:
    post:
      operationId: predictDay
      tags: [atlanta]
      summary: Predict next-day traffic conditions across all metro signals
      description: Forecasts a 24-hour traffic-stress profile for every signal by combining the historical demand baseline with day-of-week, hour-of-day, weather, special-event, and accident-risk multipliers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PredictDayRequest"
      responses:
        "200":
          description: Predicted day bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictedDay"
  /atlanta/live-incidents:
    get:
      operationId: getLiveIncidents
      tags: [atlanta]
      summary: Live Atlanta-metro traffic incidents from GDOT NaviGAtor 511
      description: Pulls the public 511ga.org map data feeds (no API key — same JSON the public website uses), filters to the Atlanta metro bbox, and snaps each incident to its nearest signalized intersection within 500m. Cached server-side for 90s.
      responses:
        "200":
          description: Live incidents bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveIncidentsBundle"
  /atlanta/traffic-flow/history:
    get:
      operationId: getTrafficFlowHistory
      tags: [atlanta]
      summary: GDOT 511 incident archive (rolling time-series)
      description: |
        Public read-only summary + per-snapshot series for the background
        archive worker that polls GDOT 511 every 10 minutes and persists an
        incident snapshot. Data accumulates from server boot forward.
      parameters:
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 2000
            default: 500
      responses:
        "200":
          description: Archive bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrafficFlowHistory"
  /atlanta/accuracy:
    get:
      operationId: getPredictionAccuracy
      tags: [atlanta]
      summary: Today's predicted-vs-actual accuracy + 7-day rolling history
      description: Computes today's prediction with a default scenario, compares the top-N predicted-worst signals against the signals that actually saw a live incident today, persists the snapshot, and returns the rolling accuracy history used to refine future forecasts.
      parameters:
        - in: query
          name: topN
          schema:
            type: integer
            default: 200
            minimum: 10
            maximum: 1000
      responses:
        "200":
          description: Prediction accuracy report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccuracyReport"
  /atlanta/live-weather:
    get:
      operationId: getLiveWeather
      summary: Current Atlanta weather conditions (Open-Meteo, no API key required)
      description: |
        Returns the current Atlanta-metro weather plus a 24-hour outlook,
        classified into one of {clear, light_rain, heavy_rain, snow} so it can
        be plugged directly into the prediction model.
      responses:
        "200":
          description: Live weather snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveWeather"
  /atlanta/live-hotspot-fixes:
    get:
      operationId: getLiveHotspotFixes
      tags: [atlanta]
      summary: Suggested signal-timing fixes for crash-prone hotspots that are congested right now
      description: |
        Returns the top accident-prone intersections that are operating in
        heavy or worse congestion at this very moment, each with a concrete
        signal-timing recommendation (target phase, current vs suggested
        green seconds, cycle change, expected delay reduction). Combines the
        live per-signal stress model with the historical-crash risk tier so
        operators can prioritize fixes where both crash exposure and current
        delay are highest. Cached server-side for 60 seconds.
      responses:
        "200":
          description: Live hotspot fixes bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveHotspotFixesBundle"
  /atlanta/dms-speeds:
    get:
      operationId: getDmsSpeeds
      summary: Real-time DMS speed readings from GDOT 511 boards
      description: |
        Fetches the GDOT 511 v2 MessageSigns API, filters to the Atlanta
        metro bounding box, and parses speed values from DMS board messages
        (e.g. "I-85 AVG SPEED 60-65 MPH"). Returns only signs that have a
        parseable speed reading. Requires the GDOT_511_API_KEY secret.
        Cached server-side for 90 seconds.
      responses:
        "200":
          description: DMS speed readings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DmsSpeedBundle"
  /atlanta/alerts:
    get:
      operationId: getGdotAlerts
      summary: GDOT metro-wide alerts (weekend closures, special events)
      description: |
        Fetches the GDOT 511 v2 Alerts API which returns high-level
        metro-wide notices (weekend closure summaries, major event
        advisories). Requires the GDOT_511_API_KEY secret.
        Cached server-side for 5 minutes.
      responses:
        "200":
          description: Current GDOT alerts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GdotAlertsBundle"
  /atlanta/live-traffic-flow:
    get:
      operationId: getLiveTrafficFlow
      summary: Apple-Maps-style live road colors for Atlanta
      description: |
        Produces a live, Apple-Maps-style colored road map of metro Atlanta.
        When the GDOT_511_API_KEY is configured, highway segments near DMS
        boards blend real measured speeds (60% weight) with the per-signal
        stress model (40% weight). Segments away from DMS boards and all
        non-highway roads remain model-estimated. Without the key, all
        colors are estimated from the model + public incident feed.
        Cached for 60 seconds.
      parameters:
        - in: query
          name: classes
          description: Comma-separated OSM road class indices to include (0=motorway, 1=trunk, 2=primary, 3=secondary). Default `0,1,2`.
          schema:
            type: string
      responses:
        "200":
          description: Live colored road network
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveTrafficFlow"
  /atlanta/predicted-traffic-flow:
    get:
      operationId: getPredictedTrafficFlow
      tags: [atlanta]
      summary: Predicted hour-by-hour road-network congestion map
      description: |
        Produces an Apple-Maps-style colored road map for a future date and hour,
        using the same per-signal stress model as the live map but without live
        incidents or DMS data. Useful for visualizing tomorrow's predicted
        congestion hour by hour.
      parameters:
        - in: query
          name: date
          required: true
          description: "Date in YYYY-MM-DD format"
          schema:
            type: string
        - in: query
          name: hour
          required: true
          description: "Hour of day 0-23"
          schema:
            type: integer
            minimum: 0
            maximum: 23
        - in: query
          name: weather
          schema:
            type: string
            enum: [clear, light_rain, heavy_rain, snow]
        - in: query
          name: schoolDay
          schema:
            type: boolean
        - in: query
          name: falconsHome
          schema:
            type: boolean
        - in: query
          name: hawksHome
          schema:
            type: boolean
        - in: query
          name: bravesHome
          schema:
            type: boolean
        - in: query
          name: gtFootball
          schema:
            type: boolean
        - in: query
          name: holiday
          schema:
            type: boolean
        - in: query
          name: classes
          description: Comma-separated OSM road class indices (0=motorway, 1=trunk, 2=primary, 3=secondary). Default `0,1,2`.
          schema:
            type: string
      responses:
        "200":
          description: Predicted colored road network for the given date and hour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictedTrafficFlow"
  /atlanta/backtest-report:
    get:
      operationId: getBacktestReport
      tags: [atlanta]
      summary: Audit-grade backtest credibility report
      description: |
        Aggregates the full prediction-history.json into a single, audit-friendly
        report intended to be the data source for a printable "sales sheet"
        showing exactly how the deployed model performed day over day.
        Includes pooled hit-rate with a Wilson 95% CI, lift versus the random-
        shortlist baseline, per-day series, day-of-week breakdown, best/worst
        day, and the methodology paragraphs.
      responses:
        "200":
          description: Backtest credibility report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestReport"
  /atlanta/parking/summary:
    get:
      operationId: getParkingSummary
      tags: [atlanta]
      summary: Metro-wide parking pressure KPIs (modeled)
      parameters:
        - in: query
          name: forceSurge
          description: If true, force every venue's event-surge window on (demo mode).
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Parking summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingSummary"
  /atlanta/parking/lots:
    get:
      operationId: listParkingLots
      tags: [atlanta]
      summary: Every known metro-Atlanta parking lot with current modeled fill
      parameters:
        - in: query
          name: forceSurge
          schema:
            type: boolean
            default: false
        - in: query
          name: minCapacity
          description: Filter out lots smaller than this estimated capacity.
          schema:
            type: integer
            minimum: 0
        - in: query
          name: maxFillPct
          description: Filter out lots already above this fill percentage.
          schema:
            type: number
        - in: query
          name: archetype
          schema:
            type: string
            enum: [commercial, office, event, park_and_ride, university, airport, mixed]
      responses:
        "200":
          description: Lot list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParkingLot"
  /atlanta/parking/lots/{id}:
    get:
      operationId: getParkingLot
      tags: [atlanta]
      summary: Single parking lot detail with 12-hour fill forecast
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lot detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingLotDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /atlanta/today-accident-predictions:
    get:
      operationId: getTodayAccidentPredictions
      summary: Top-N predicted accident hotspots for today (signal × hour)
      description: |
        Combines today's prediction (auto-using live weather and the recent-
        activity feedback loop) with the per-signal historical crash risk and
        the FARS hour-of-day distribution to rank the most accident-likely
        (intersection, hour) pairs for the rest of today.
      parameters:
        - in: query
          name: topN
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - in: query
          name: includePastHours
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Today's predicted accident hotspots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayAccidentPredictions"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    TrafficFlowHistorySnapshot:
      type: object
      properties:
        capturedAt: { type: string, format: date-time }
        incidentCount: { type: integer }
        snappedCount: { type: integer }
        weatherCondition: { type: string, nullable: true }
      required: [capturedAt, incidentCount, snappedCount]
    TrafficFlowHistorySummary:
      type: object
      properties:
        totalSnapshots: { type: integer }
        earliestCapturedAt: { type: string, format: date-time, nullable: true }
        latestCapturedAt: { type: string, format: date-time, nullable: true }
        windowSnapshots: { type: integer }
        windowAvgIncidents: { type: number }
        windowMaxIncidents: { type: integer }
      required: [totalSnapshots, windowSnapshots, windowAvgIncidents, windowMaxIncidents]
    TrafficFlowHistory:
      type: object
      properties:
        summary: { $ref: "#/components/schemas/TrafficFlowHistorySummary" }
        series:
          type: array
          items: { $ref: "#/components/schemas/TrafficFlowHistorySnapshot" }
      required: [summary, series]
    SignalTiming:
      type: object
      properties:
        nsGreen:
          type: integer
        ewGreen:
          type: integer
        protectedLeft:
          type: integer
        allRed:
          type: integer
        cycleLength:
          type: integer
      required: [nsGreen, ewGreen, protectedLeft, allRed, cycleLength]
    TrafficVolume:
      type: object
      properties:
        north:
          type: integer
        south:
          type: integer
        east:
          type: integer
        west:
          type: integer
        total:
          type: integer
      required: [north, south, east, west, total]
    ApproachMovements:
      type: object
      description: Three turning movements from a single approach (incoming direction).
      properties:
        thru:
          type: integer
        left:
          type: integer
        right:
          type: integer
      required: [thru, left, right]
    MovementBreakdown:
      type: object
      description: Full 12-movement breakdown (4 approaches × thru/left/right) with totals.
      properties:
        northbound:
          $ref: "#/components/schemas/ApproachMovements"
        southbound:
          $ref: "#/components/schemas/ApproachMovements"
        eastbound:
          $ref: "#/components/schemas/ApproachMovements"
        westbound:
          $ref: "#/components/schemas/ApproachMovements"
        totalThrough:
          type: integer
        totalLeft:
          type: integer
        totalRight:
          type: integer
        totalTurning:
          type: integer
          description: Left + right turns combined.
        total:
          type: integer
      required: [northbound, southbound, eastbound, westbound, totalThrough, totalLeft, totalRight, totalTurning, total]
    WorstMovement:
      type: object
      properties:
        label:
          type: string
        phase:
          type: string
          enum: [Protected Left, N/S Green, E/W Green]
        vcRatio:
          type: number
      required: [label, phase, vcRatio]
    RoadNetwork:
      type: object
      properties:
        classes:
          type: array
          items:
            type: string
        ways:
          type: array
          items: {}
      required: [classes, ways]
    IntersectionSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        zone:
          type: string
        roadClass:
          type: string
          enum: [motorway, trunk, primary, secondary, other]
        latitude:
          type: number
        longitude:
          type: number
        totalVolume:
          type: integer
        turningVolume:
          type: integer
          description: Total turning movements (left + right) per hour at this intersection.
        inefficiencyScore:
          type: number
        avgDelaySeconds:
          type: number
        severity:
          type: string
          enum: [low, moderate, high, critical]
      required:
        - id
        - name
        - zone
        - roadClass
        - latitude
        - longitude
        - totalVolume
        - turningVolume
        - inefficiencyScore
        - avgDelaySeconds
        - severity
    Intersection:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        zone:
          type: string
        roadClass:
          type: string
          enum: [motorway, trunk, primary, secondary, other]
        latitude:
          type: number
        longitude:
          type: number
        totalVolume:
          type: integer
        turningVolume:
          type: integer
        signalTiming:
          $ref: "#/components/schemas/SignalTiming"
        trafficVolume:
          $ref: "#/components/schemas/TrafficVolume"
        movementBreakdown:
          $ref: "#/components/schemas/MovementBreakdown"
        worstMovement:
          $ref: "#/components/schemas/WorstMovement"
        inefficiencyScore:
          type: number
        avgDelaySeconds:
          type: number
        severity:
          type: string
          enum: [low, moderate, high, critical]
      required:
        - id
        - name
        - zone
        - roadClass
        - latitude
        - longitude
        - totalVolume
        - turningVolume
        - signalTiming
        - trafficVolume
        - movementBreakdown
        - worstMovement
        - inefficiencyScore
        - avgDelaySeconds
        - severity
    IntersectionDetail:
      type: object
      properties:
        intersection:
          $ref: "#/components/schemas/Intersection"
        hourlyLoad:
          type: array
          items:
            $ref: "#/components/schemas/HourlyLoadPoint"
        recommendation:
          $ref: "#/components/schemas/Recommendation"
      required:
        - intersection
        - hourlyLoad
        - recommendation
    TrafficSummary:
      type: object
      properties:
        intersectionCount:
          type: integer
        totalDailyVehicles:
          type: integer
        totalTurningMovementsPerHour:
          type: integer
          description: Sum of left + right turning movements per hour across all intersections.
        totalThroughMovementsPerHour:
          type: integer
        averageInefficiency:
          type: number
        averageDelaySeconds:
          type: number
        criticalCount:
          type: integer
        highCount:
          type: integer
        moderateCount:
          type: integer
        lowCount:
          type: integer
        worstIntersectionId:
          type: string
        worstIntersectionName:
          type: string
        worstIntersectionScore:
          type: number
      required:
        - intersectionCount
        - totalDailyVehicles
        - totalTurningMovementsPerHour
        - totalThroughMovementsPerHour
        - averageInefficiency
        - averageDelaySeconds
        - criticalCount
        - highCount
        - moderateCount
        - lowCount
        - worstIntersectionId
        - worstIntersectionName
        - worstIntersectionScore
    InefficiencyRanking:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        zone:
          type: string
        inefficiencyScore:
          type: number
        avgDelaySeconds:
          type: number
        turningVolume:
          type: integer
        worstMovement:
          type: string
        protectedLeftSeconds:
          type: integer
        severity:
          type: string
          enum: [low, moderate, high, critical]
      required:
        - id
        - name
        - zone
        - inefficiencyScore
        - avgDelaySeconds
        - turningVolume
        - worstMovement
        - protectedLeftSeconds
        - severity
    ZoneStat:
      type: object
      properties:
        zone:
          type: string
        intersectionCount:
          type: integer
        avgInefficiency:
          type: number
        totalTurningMovements:
          type: integer
        totalVolume:
          type: integer
        avgDelaySeconds:
          type: number
      required:
        - zone
        - intersectionCount
        - avgInefficiency
        - totalTurningMovements
        - totalVolume
        - avgDelaySeconds
    MovementTypeStat:
      type: object
      properties:
        movement:
          type: string
          enum: [through, left, right]
        label:
          type: string
        totalVehicles:
          type: integer
        avgPerIntersection:
          type: number
      required:
        - movement
        - label
        - totalVehicles
        - avgPerIntersection
    SignalTimingPoint:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        nsGreen:
          type: integer
        ewGreen:
          type: integer
        protectedLeft:
          type: integer
        allRed:
          type: integer
        cycleLength:
          type: integer
      required: [id, name, nsGreen, ewGreen, protectedLeft, allRed, cycleLength]
    HourlyLoadPoint:
      type: object
      properties:
        hour:
          type: integer
        label:
          type: string
        throughVehicles:
