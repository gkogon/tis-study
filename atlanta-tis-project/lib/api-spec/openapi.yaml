    LiveHotspotFix:
      type: object
      description: A crash-prone intersection currently in heavy or worse congestion, with a concrete signal-timing recommendation derived from the same Webster's-delay engine the dashboard uses.
      properties:
        intersectionId:
          type: string
        intersectionName:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        currentScore:
          type: number
          description: Current-hour predicted stress (0..100).
        currentLevel:
          type: string
          enum: [free, light, heavy, severe, closed]
        hasNearbyIncident:
          type: boolean
          description: True iff an active GDOT incident sits within ~600m of the intersection.
        nearestIncidentMeters:
          type: number
          nullable: true
        crashes:
          type: integer
        fatal:
          type: integer
        seriousInjuries:
          type: integer
        riskTier:
          type: string
          enum: [none, low, moderate, high, severe]
        targetPhase:
          type: string
          enum: [Protected Left, N/S Green, E/W Green]
        targetMovement:
          type: string
        currentPhaseSeconds:
          type: integer
        suggestedPhaseSeconds:
          type: integer
        currentCycleLength:
          type: integer
        suggestedCycleLength:
          type: integer
        estimatedDelayReductionSeconds:
          type: number
        rationale:
          type: string
        hotspotScore:
          type: number
          description: Combined sort key (0..100) blending current stress, crash count, fatality bonus, and live-incident proximity.
      required:
        - intersectionId
        - intersectionName
        - latitude
        - longitude
        - currentScore
        - currentLevel
        - hasNearbyIncident
        - nearestIncidentMeters
        - crashes
        - fatal
        - seriousInjuries
        - riskTier
        - targetPhase
        - targetMovement
        - currentPhaseSeconds
        - suggestedPhaseSeconds
        - currentCycleLength
        - suggestedCycleLength
        - estimatedDelayReductionSeconds
        - rationale
        - hotspotScore
    LiveHotspotFixesBundle:
      type: object
      properties:
        fetchedAt:
          type: string
        currentHourLocal:
          type: integer
        hourLabel:
          type: string
        totalCandidates:
          type: integer
          description: How many signals matched the (heavy+ congestion AND high+ crash tier) filter before the top-N cap.
        fixes:
          type: array
          items:
            $ref: "#/components/schemas/LiveHotspotFix"
        note:
          type: string
      required:
        - fetchedAt
        - currentHourLocal
        - hourLabel
        - totalCandidates
        - fixes
        - note
