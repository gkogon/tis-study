[build]
  publish = "."

[[redirects]]
  from = "/atlanta-tis-project.zip"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/dist/*"
  to = "/404.html"
  status = 404
  force = true

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
